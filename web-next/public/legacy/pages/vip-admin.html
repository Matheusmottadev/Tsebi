  <!-- SEO META START -->
  <meta name="description" content="Painel administrativo VIP interno da Tsebi." />

  <meta property="og:description" content="Painel administrativo VIP interno da Tsebi." />
  <meta property="og:url" content="https://tsebi.com.br/vip-admin.html" />
  <meta property="og:site_name" content="Tsebi Brasil" />
  <meta property="og:image" content="https://tsebi.com.br/images/logo-tsebi.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="VIP Admin | Tsebi" />
  <meta name="twitter:description" content="Painel administrativo VIP interno da Tsebi." />
  <meta name="twitter:image" content="https://tsebi.com.br/images/logo-tsebi.png" />
  <!-- SEO META END -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f7f4ef;
      --card: #ffffff;
      --text: #171717;
      --muted: #6a665f;
      --line: #ddd6c9;
      --danger: #9d1f1f;
      --ok: #1d5e2b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Montserrat", sans-serif;
    }

    .wrap {
      max-width: 1160px;
      margin: 0 auto;
      padding: 28px 18px 40px;
    }

    h1 {
      margin: 0;
      font-family: "Playfair Display", serif;
      font-size: 38px;
      font-weight: 600;
    }

    .muted {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .card {
      margin-top: 22px;
      background: var(--card);
      border: 1px solid var(--line);
      padding: 16px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      align-items: center;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(130px, 1fr));
      gap: 10px;
      align-items: end;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field label {
      font-size: 11px;
      letter-spacing: 0.7px;
      text-transform: uppercase;
      color: #5e5a53;
    }

    input[type="password"],
    input[type="text"],
    input[type="email"],
    input[type="date"] {
      width: 100%;
      min-height: 42px;
      border: 1px solid #cfc8bc;
      padding: 0 10px;
      background: #fff;
      color: var(--text);
      font-family: "Montserrat", sans-serif;
      font-size: 14px;
    }

    .checkbox-field {
      min-height: 42px;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid #cfc8bc;
      padding: 0 10px;
      background: #fff;
      font-size: 13px;
    }

    button {
      min-height: 42px;
      border: 1px solid #151515;
      background: #151515;
      color: #fff;
      padding: 0 14px;
      cursor: pointer;
      font-family: "Montserrat", sans-serif;
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    button.secondary {
      background: #fff;
      color: #151515;
    }

    button.danger {
      border-color: #7c2f2f;
      background: #7c2f2f;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .status {
      margin-top: 10px;
      min-height: 20px;
      font-size: 13px;
      color: var(--muted);
    }

    .status.error {
      color: var(--danger);
    }

    .status.ok {
      color: var(--ok);
    }

    .list-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .count {
      border: 1px solid #cfc8bc;
      padding: 6px 10px;
      font-size: 12px;
      letter-spacing: 0.7px;
      text-transform: uppercase;
      background: #fbf8f2;
    }

    .vip-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 10px;
    }

    .vip-item {
      border: 1px solid #e8e2d8;
      background: #fff;
    }

    .vip-item-head {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border-bottom: 1px solid #f1ece4;
    }

    .vip-main {
      display: grid;
      gap: 3px;
    }

    .vip-main strong {
      font-size: 14px;
    }

    .vip-main span {
      font-size: 12px;
      color: var(--muted);
    }

    .pill {
      display: inline-block;
      border: 1px solid #1d5e2b;
      color: #1d5e2b;
      padding: 2px 7px;
      font-size: 11px;
      border-radius: 12px;
      white-space: nowrap;
    }

    .pill.no {
      border-color: #7c2f2f;
      color: #7c2f2f;
    }

    .vip-details {
      display: none;
      padding: 10px;
      background: #fcfaf6;
    }

    .vip-item.open .vip-details {
      display: block;
    }

    .vip-details-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(180px, 1fr));
      gap: 8px 14px;
      font-size: 13px;
    }

    .empty {
      border: 1px dashed #d8d1c4;
      padding: 12px;
      color: var(--muted);
      font-size: 13px;
      background: #fcfaf7;
    }

    [hidden] {
      display: none !important;
    }

    @media (max-width: 980px) {
      .row {
        grid-template-columns: 1fr;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .vip-item-head {
        grid-template-columns: 1fr;
      }

      .vip-details-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>VIP Admin</h1>
    <p class="muted">Acesso por token para gerenciar inscritos da lista VIP.</p>

    <section class="card">
      <div class="row">
        <input id="vipToken" type="password" placeholder="VIP_ADMIN_TOKEN" autocomplete="off" />
        <button id="saveTokenBtn" type="button">Acessar</button>
        <button id="clearTokenBtn" type="button" class="secondary">Sair</button>
      </div>
      <p class="status" id="authStatus"></p>
    </section>

    <section class="card" id="addCard" hidden>
      <div class="form-grid">
        <div class="field">
          <label for="newVipName">Nome</label>
          <input id="newVipName" type="text" maxlength="120" placeholder="Nome completo" />
        </div>
        <div class="field">
          <label for="newVipEmail">Email</label>
          <input id="newVipEmail" type="email" maxlength="160" placeholder="email@dominio.com" />
        </div>
        <div class="field">
          <label for="newVipBirthDate">Nascimento</label>
          <input id="newVipBirthDate" type="date" />
        </div>
        <div class="field">
          <label for="newVipCpf">CPF</label>
          <input id="newVipCpf" type="text" inputmode="numeric" maxlength="14" placeholder="Somente numeros" />
        </div>
        <div class="field">
          <label for="newVipCep">CEP</label>
          <input id="newVipCep" type="text" inputmode="numeric" maxlength="9" placeholder="Somente numeros" />
        </div>
      </div>

      <div style="margin-top:10px; display:grid; grid-template-columns: 1fr auto; gap:10px; align-items:center;">
        <label class="checkbox-field">
          <input id="newVipAccountCreated" type="checkbox" />
          Marcar conta criada
        </label>
        <button id="addVipBtn" type="button">Adicionar inscrito</button>
      </div>

      <p class="status" id="formStatus"></p>
    </section>

    <section class="card" id="listCard" hidden>
      <div class="list-head">
        <strong>Inscritos VIP</strong>
        <span class="count" id="vipCount">0 inscritos</span>
      </div>
      <p class="status" id="loadStatus"></p>
      <div id="emptyState" class="empty" hidden>Nenhum inscrito encontrado.</div>
      <ul class="vip-list" id="vipList"></ul>
    </section>
  </main>

  <script src="/JS/vip-admin.js?v=20260217b"></script>
  <script src="/JS/posthog.js"></script>
</body>
</html>
