  <main class="conta-wrap">

</footer>

        </div>

      <article class="conta-card" id="card-orders" data-card="orders">

        </div>

      <article class="conta-card" id="card-private" data-card="private">

        <p>Você não tem nenhum Atendimento Privado em breve.</p>
        <div class="conta-card-actions">
          <a class="btn-primary" href="https://wa.me/5511918596632?text=Ol%C3%A1%2C%20quero%20agendar%20um%20atendimento%20privado." target="_blank" rel="noopener noreferrer">Agendar atendimento privado</a>

        </div>

      <article class="conta-card" id="card-wishlist" data-card="wishlist">

        <div class="conta-card-actions">
          <a class="btn-outline" href="#wishlist">Ver lista</a>
          <button type="button" class="conta-toggle" data-toggle="wishlist">Ver detalhes</button>
        </div>
        <div class="conta-details" id="details-wishlist"></div>
      </article>

      <article class="conta-card" id="card-recommendations" data-card="recommendations">
        <h2>Recomendações</h2>
        <p id="recommendSummary">Não há nenhuma recomendação.</p>

        </div>

          <button type="button" class="conta-toggle" data-toggle="repairs">Ver detalhes</button>
        </div>
        <div class="conta-details" id="details-repairs"></div>

  <template id="tpl-orders">
    <h1 class="account-title">Meus Pedidos</h1>
    <section class="account-grid orders-grid">
      <div class="account-panel orders-main-panel">
        <div id="ordersListMount"></div>
        <div class="orders-load-more-wrap">
          <button type="button" class="btn-outline" id="ordersLoadMoreBtn" hidden>Carregar mais</button>
        </div>
      </div>
      <div class="account-right-col">
        <section class="account-panel">
          <h2>Resumo</h2>
          <div class="orders-summary-list">
            <div class="orders-summary-row"><span>Total de pedidos</span><strong id="ordersSummaryCount">0</strong></div>
            <div class="orders-summary-row"><span>?sltimo pedido</span><strong id="ordersSummaryLast">-</strong></div>
            <div class="orders-summary-row"><span>Status do ?ltimo</span><strong id="ordersSummaryStatus">-</strong></div>
          </div>
        </section>
        <section class="account-panel">
          <h2>Ajuda com pedidos</h2>
          <a class="btn-primary" href="https://wa.me/5511918596632?text=Ol%C3%A1%2C%20preciso%20de%20ajuda%20com%20meu%20pedido." target="_blank" rel="noopener noreferrer">Falar com suporte</a>
          <a class="policy-link" href="politica-privacidade.html">Política de trocas e devoluções</a>
        </section>

  <template id="tpl-private-care">
    <h1 class="account-title">Atendimentos Privados</h1>
    <section class="account-grid account-section-grid">
      <div class="account-panel-stack">
        <section class="account-panel">
          <h2>Agendar Atendimento</h2>
          <p class="panel-note">Atendimento dedicado com nosso time.</p>
          <form id="privateCareForm" class="account-form-grid" novalidate>
            <div class="field">
              <label for="privateCareChannel">Canal</label>
              <select id="privateCareChannel">
                <option value="WhatsApp">WhatsApp</option>
                <option value="Ligação">Ligação</option>
                <option value="Vídeo">Vídeo</option>
              </select>
            </div>
            <div class="field-grid-2">
              <div class="field">
                <label for="privateCareDate">Data</label>
                <input id="privateCareDate" type="date" />
              </div>
              <div class="field">
                <label for="privateCareTime">Horário</label>
                <select id="privateCareTime">
                  <option value="">Selecione</option>
                  <option value="09:00">09:00</option>
                  <option value="11:00">11:00</option>
                  <option value="14:00">14:00</option>
                  <option value="16:00">16:00</option>
                  <option value="18:00">18:00</option>
                </select>
              </div>
            </div>
            <div class="field">
              <label for="privateCareSubject">Assunto</label>
              <select id="privateCareSubject">
                <option value="Pedido">Pedido</option>
                <option value="Tamanho/caimento">Tamanho/caimento</option>
                <option value="Produto">Produto</option>
                <option value="Outros">Outros</option>
              </select>
            </div>
            <div class="field">
              <label for="privateCareMessage">Mensagem</label>
              <textarea id="privateCareMessage" rows="4"></textarea>
            </div>
            <button type="submit" class="btn-primary">Solicitar atendimento</button>
            <p class="section-feedback" id="privateCareFeedback"></p>
          </form>
        </section>
        <section class="account-panel">
          <h2>Meus atendimentos</h2>
          <div id="privateCareHistory"></div>
        </section>
      </div>
      <div class="account-right-col">
        <section class="account-panel">
          <h2>Preferências de contato</h2>
          <div class="switch-list">
            <label class="switch-row">E-mail <input type="checkbox" id="privatePrefEmail" /><span class="switch-ui"></span></label>
            <label class="switch-row">Telefone <input type="checkbox" id="privatePrefPhone" /><span class="switch-ui"></span></label>
            <label class="switch-row">SMS <input type="checkbox" id="privatePrefSms" /><span class="switch-ui"></span></label>
          </div>
        </section>
        <section class="account-panel">
          <h2>Ajuda</h2>
          <a class="btn-outline" href="https://wa.me/5511918596632?text=Ol%C3%A1%2C%20preciso%20de%20ajuda%20com%20atendimento%20privado." target="_blank" rel="noopener noreferrer">Falar com suporte</a>
          <a class="policy-link" href="politica-privacidade.html">Política de privacidade</a>
        </section>
      </div>
    </section>
  </template>

  <template id="tpl-recommendations">
    <h1 class="account-title">Recomendações</h1>
    <section class="account-grid account-section-grid">
      <div class="account-panel-stack">
        <section class="account-panel">
          <h2>Selecionadas para você</h2>
          <span class="tiny-badge">Com base nos seus favoritos</span>
          <div id="recommendationsGrid" class="wishlist-grid"></div>
          <div class="orders-load-more-wrap">
            <button type="button" class="btn-outline" id="recommendationsLoadMoreBtn" hidden>Carregar mais</button>
          </div>
        </section>
      </div>
      <div class="account-right-col">
        <section class="account-panel">
          <h2>Seus favoritos</h2>
          <div id="recommendationsFavoritesBase"></div>
          <a class="policy-link" href="#wishlist" data-section-link="wishlist">Ver lista de desejos</a>
        </section>
        <section class="account-panel" id="recommendationsPreferencesCard" hidden>
          <h2>Preferências</h2>
          <div id="recommendationsChips" class="chip-list"></div>
        </section>
      </div>
    </section>
  </template>

  <template id="tpl-wishlist">
    <h1 class="account-title">Lista de Desejos</h1>
    <section class="account-grid account-section-grid">
      <div class="account-panel-stack">
        <section class="account-panel">
          <div class="wishlist-toolbar">
            <h2>Itens salvos</h2>
            <label class="wishlist-sort">
              <span>Ordenar</span>
              <select id="wishlistSort">
                <option value="recent">Mais recentes</option>
                <option value="price-asc">Preço: menor</option>
                <option value="price-desc">Preço: maior</option>
              </select>
            </label>
          </div>
          <div id="wishlistGrid" class="wishlist-grid"></div>
        </section>
      </div>
      <div class="account-right-col">
        <section class="account-panel">
          <h2>Resumo</h2>
          <div class="orders-summary-list">
            <div class="orders-summary-row"><span>Total de itens</span><strong id="wishlistCount">0</strong></div>
            <div class="orders-summary-row"><span>Categoria frequente</span><strong id="wishlistTopCategory">-</strong></div>
          </div>
        </section>
        <section class="account-panel">
          <h2>Ações</h2>
          <button type="button" class="btn-primary" id="wishlistSaveLaterBtn">Salvar para depois</button>
          <button type="button" class="btn-outline" id="wishlistShareBtn">Compartilhar lista</button>
          <p class="section-feedback" id="wishlistActionFeedback"></p>
        </section>
      </div>
    </section>
  </template>

  <template id="tpl-repairs">
    <h1 class="account-title">Serviço de Reparos</h1>
    <section class="account-grid account-section-grid">
      <div class="account-panel-stack">
        <section class="account-panel">
          <h2>Solicitar reparo</h2>
          <form id="repairsForm" class="account-form-grid" novalidate>
            <div class="field">
              <label for="repairProduct">Produto</label>
              <select id="repairProduct"></select>
            </div>
            <div class="field">
              <label for="repairReason">Motivo</label>
              <select id="repairReason">
                <option value="Ajuste">Ajuste</option>
                <option value="Costura">Costura</option>
                <option value="Defeito">Defeito</option>
                <option value="Outro">Outro</option>
              </select>
            </div>
            <div class="field">
              <label for="repairDescription">Descrição</label>
              <textarea id="repairDescription" rows="4"></textarea>
            </div>
            <div class="field">
              <label for="repairPhoto">Foto (opcional)</label>
              <input id="repairPhoto" type="file" accept="image/*" />
            </div>
            <button type="submit" class="btn-primary">Solicitar reparo</button>
            <p class="conta-muted">Prazo estimado: 7 a 15 dias ?teis após análise.</p>
            <p class="section-feedback" id="repairsFeedback"></p>
          </form>
        </section>
        <section class="account-panel">
          <h2>Meus reparos</h2>
          <div id="repairsHistory"></div>
        </section>
      </div>
      <div class="account-right-col">
        <section class="account-panel">
          <h2>Como funciona</h2>
          <ol class="simple-steps">
            <li>Envie sua solicitação</li>
            <li>Nosso time analisa</li>
            <li>Devolvemos seu produto</li>
          </ol>
        </section>
        <section class="account-panel">
          <h2>Atendimento</h2>
          <a class="btn-outline" href="https://wa.me/5511918596632?text=Ol%C3%A1%2C%20preciso%20de%20ajuda%20com%20reparo." target="_blank" rel="noopener noreferrer">Contate o atendimento</a>
          <a class="policy-link" href="aviso-legal.html">Termos do serviço</a>
        </section>
      </div>
    </section>
  </template>

  <template id="tpl-profile">
    <h1 class="account-title">Meu Perfil</h1>
    <section class="account-grid">
      <div class="account-panel">
        <h2>Informação Pessoal</h2>
        <form id="profileForm" novalidate>
          <div class="field">
            <label for="profileTitle">Título <span>*</span></label>
            <select id="profileTitle" required>
              <option value="">Selecione</option>
              <option value="sr">Sr.</option>
              <option value="sra">Sra.</option>
              <option value="srta">Srta.</option>
              <option value="nao_informar">Outro</option>
            </select>
            <small class="field-error" data-error-for="profileTitle"></small>
          </div>
          <div class="field-grid-2">
            <div class="field">
              <label for="profileFirstName">Nome <span>*</span></label>
              <input id="profileFirstName" type="text" required />
              <small class="field-error" data-error-for="profileFirstName"></small>
            </div>
            <div class="field">
              <label for="profileLastName">Sobrenome <span>*</span></label>
              <input id="profileLastName" type="text" required />
              <small class="field-error" data-error-for="profileLastName"></small>
            </div>
          </div>
          <div class="field">
            <label for="profileCountry">País/Região <span>*</span></label>
            <select id="profileCountry" required>
              <option value="Brasil">Brasil</option>
              <option value="Portugal">Portugal</option>
              <option value="Estados Unidos">Estados Unidos</option>
              <option value="Outro">Outro</option>
            </select>
            <small class="field-error" data-error-for="profileCountry"></small>
          </div>
          <div class="check-list">
            <label><input id="contactByEmail" type="checkbox" /> Desejo Ser Contatado por E-mail</label>
            <label><input id="contactByPhone" type="checkbox" /> Desejo Ser Contatado por Telefone</label>
            <label><input id="contactBySms" type="checkbox" /> Desejo Ser Contatado por SMS</label>
          </div>
          <div class="field">
            <label>Data de Nascimento</label>
            <div class="birth-grid">
              <select id="birthDay"><option value="">Dia</option></select>
              <select id="birthMonth"><option value="">Mês</option></select>
              <select id="birthYear"><option value="">Ano</option></select>
            </div>
          </div>
          <button type="submit" class="btn-primary btn-full">Salve as suas informações</button>
        </form>
      </div>
      <div class="account-right-col">
        <section class="account-panel">
          <h2>Minhas Preferências</h2>
          <p class="panel-note">Selecione os canais em que você deseja receber notícias e lançamentos!</p>
          <a class="policy-link" href="politica-privacidade.html">Política de Privacidade</a>
          <div class="switch-list">
            <label class="switch-row">E-mail <input type="checkbox" id="prefEmail" /><span class="switch-ui"></span></label>
            <label class="switch-row">Telefone <input type="checkbox" id="prefPhone" /><span class="switch-ui"></span></label>
            <label class="switch-row">Mensagem de texto <input type="checkbox" id="prefSms" /><span class="switch-ui"></span></label>
            <label class="switch-row">Postal <input type="checkbox" id="prefPostal" /><span class="switch-ui"></span></label>
          </div>
        </section>
        <section class="account-panel">
          <h2>Informações para Login</h2>
          <div class="field">
            <label>Email</label>
            <input id="loginEmail" type="email" readonly />
          </div>
          <div class="login-password-row">
            <span>Senha</span>
            <button class="btn-primary btn-small" type="button" id="openPasswordModal">Alterar</button>
          </div>
          <div class="login-passkey-row">
            <span>Passkey</span>
            <button class="btn-outline btn-small" type="button" id="enablePasskeyBtn">Ativar neste dispositivo</button>
          </div>
          <p class="panel-note" id="passkeyFeedback"></p>
        </section>
        <section class="account-panel">
          <h2>Meus Endereços</h2>
          <div id="addressesEmpty" class="empty-copy">Você não possui nenhum endereço salvo</div>
          <div id="addressesList" class="address-list"></div>
          <button type="button" class="btn-outline" id="addAddressBtn">Adicionar novo endereço</button>
        </section>
      </div>
    </section>
    <div class="toast" id="profileToast" role="status" aria-live="polite"></div>
    <div class="modal-backdrop" id="passwordModal" hidden>
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="passwordModalTitle">
        <h3 id="passwordModalTitle">Alterar senha</h3>
        <form id="passwordForm" class="modal-form">
          <label for="currentPassword">Senha atual</label>
          <input id="currentPassword" type="password" required />
          <label for="newPassword">Nova senha</label>
          <input id="newPassword" type="password" required />
          <label for="confirmPassword">Confirmar senha</label>
          <input id="confirmPassword" type="password" required />
          <div class="modal-actions">
            <button type="button" class="btn-outline" id="closePasswordModal">Cancelar</button>
            <button type="submit" class="btn-primary">Salvar</button>
          </div>
        </form>
      </div>
