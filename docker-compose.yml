version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: tsebi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tsebi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - tsebi_postgres_data:/var/lib/postgresql/data

volumes:
  tsebi_postgres_data:
