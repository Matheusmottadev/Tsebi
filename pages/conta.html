<body class="account-auth-page">
  <header class="cart-simple-header">
    <a class="cart-simple-logo" href="index.html">TSEBI</a>
    <nav class="cart-simple-actions">
      <a href="index.html">Voltar a loja</a>
      <a href="cart.html">Carrinho</a>
    </nav>
  </header>

  <main class="account-auth-main">
    <section class="account-auth-card">
      <p class="account-auth-kicker">Conta Tsebi</p>
      <h1>Acesse sua conta</h1>

      <section class="account-auth-panel is-active" id="authPanelEmail">
        <form id="emailCheckForm" class="account-auth-form" novalidate>
          <label>
            <span>E-mail</span>
            <input type="email" id="emailCheckInput" required autocomplete="email" />
          </label>
          <button type="submit" class="account-auth-submit">Continuar</button>
        </form>
      </section>

      <section class="account-auth-panel" id="authPanelLogin" hidden>
        <p class="account-auth-flow-note">Conta encontrada para <strong id="detectedEmailLogin"></strong></p>
        <form id="loginForm" class="account-auth-form" novalidate>
          <label>
            <span>Senha</span>
            <input type="password" id="loginPassword" required minlength="8" autocomplete="current-password" />
          </label>
          <label id="loginCodeField" hidden>
            <span>Codigo do e-mail</span>
            <input type="text" id="loginEmailCode" inputmode="numeric" maxlength="6" autocomplete="one-time-code" />
          </label>
          <button type="submit" class="account-auth-submit">Entrar</button>
        </form>
        <button type="button" id="resendLoginCodeBtn" class="account-auth-link" hidden>Reenviar codigo</button>
        <a id="forgotPasswordBtn" class="account-auth-link" href="recuperar-senha.html">Esqueci minha senha</a>
        <button type="button" id="changeEmailFromLogin" class="account-auth-link">Usar outro e-mail</button>
      </section>

      <section class="account-auth-panel" id="authPanelRegister" hidden>
        <p class="account-auth-flow-note">Criar nova conta para <strong id="detectedEmailRegister"></strong></p>
        <form id="registerForm" class="account-auth-form" novalidate>
          <div class="account-auth-grid">
            <label class="account-auth-grid-full">
              <span>Nome completo</span>
              <input type="text" id="registerName" required minlength="2" autocomplete="name" />
            </label>
            <label>
              <span>Data de nascimento</span>
              <input type="date" id="registerBirthDate" required autocomplete="bday" />
            </label>
            <label>
              <span>CPF</span>
              <input type="text" id="registerCpf" required inputmode="numeric" maxlength="14" autocomplete="off" />
            </label>
            <label>
              <span>CEP</span>
              <input type="text" id="registerCep" required inputmode="numeric" maxlength="9" autocomplete="postal-code" />
            </label>
            <label>
              <span>Telefone</span>
              <input type="tel" id="registerPhone" inputmode="numeric" maxlength="16" autocomplete="tel" />
            </label>
            <label class="account-auth-grid-full">
              <span>Senha</span>
              <input type="password" id="registerPassword" required minlength="8" autocomplete="new-password" />
            </label>
            <label class="account-auth-grid-full">
              <span>Confirmar senha</span>
              <input type="password" id="registerPasswordConfirm" required minlength="8" autocomplete="new-password" />
            </label>
          </div>
          <div class="account-auth-consent-group" id="registerConsentGroup">
            <label class="account-auth-consent">
              <input type="checkbox" id="registerConsentTerms" required />
              <span>
                Li e aceito os <a href="aviso-legal.html" target="_blank" rel="noopener noreferrer">Termos de Uso</a> e a
                <a href="politica-privacidade.html" target="_blank" rel="noopener noreferrer">Política de Privacidade</a> da Tsebi.
              </span>
            </label>
            <label class="account-auth-consent">
              <input type="checkbox" id="registerConsentLgpd" required />
              <span>
                Autorizo o tratamento dos meus dados para criação e gestão da conta, processamento de pedidos, prevenção a fraudes
                e atendimento, conforme a LGPD.
              </span>
            </label>
            <label class="account-auth-consent">
              <input type="checkbox" id="registerConsentMarketing" />
              <span>
                Quero receber novidades, lançamentos e conteúdos da Tsebi por e-mail e WhatsApp. Consentimento opcional e revogável.
              </span>
            </label>
          </div>
          <label id="registerCodeField" hidden>
            <span>Codigo do e-mail</span>
            <input type="text" id="registerEmailCode" inputmode="numeric" maxlength="6" autocomplete="one-time-code" />
          </label>
          <button type="submit" class="account-auth-submit">Criar conta</button>
        </form>
        <button type="button" id="resendRegisterCodeBtn" class="account-auth-link" hidden>Reenviar codigo</button>
        <button type="button" id="changeEmailFromRegister" class="account-auth-link">Usar outro e-mail</button>
      </section>

      <p class="account-auth-feedback" id="authFeedback" aria-live="polite"></p>
    </section>
  </main>

  <script src="JS/user-utils.js?v=20260217c"></script>
  <script src="JS/conta.js?v=20260219b"></script>
  <script src="JS/posthog.js"></script>
</body>
</html>
