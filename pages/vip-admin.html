<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>VIP Admin | Tsebi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f7f4ef;
      --card: #ffffff;
      --text: #171717;
      --muted: #6a665f;
      --line: #ddd6c9;
      --danger: #9d1f1f;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Montserrat", sans-serif;
    }

    .wrap {
      max-width: 1160px;
      margin: 0 auto;
      padding: 28px 18px 40px;
    }

    h1 {
      margin: 0;
      font-family: "Playfair Display", serif;
      font-size: 38px;
      font-weight: 600;
    }

    .muted {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .card {
      margin-top: 22px;
      background: var(--card);
      border: 1px solid var(--line);
      padding: 16px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      align-items: center;
    }

    input[type="password"],
    input[type="number"] {
      width: 100%;
      min-height: 42px;
      border: 1px solid #cfc8bc;
      padding: 0 10px;
      background: #fff;
      color: var(--text);
      font-family: "Montserrat", sans-serif;
      font-size: 14px;
    }

    button {
      min-height: 42px;
      border: 1px solid #151515;
      background: #151515;
      color: #fff;
      padding: 0 14px;
      cursor: pointer;
      font-family: "Montserrat", sans-serif;
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    button.secondary {
      background: #fff;
      color: #151515;
    }

    .status {
      margin-top: 10px;
      min-height: 20px;
      font-size: 13px;
      color: var(--muted);
    }

    .status.error {
      color: var(--danger);
    }

    .actions {
      margin-top: 14px;
      display: grid;
      grid-template-columns: 150px 140px 120px;
      gap: 10px;
      align-items: center;
    }

    table {
      margin-top: 14px;
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border: 1px solid var(--line);
      font-size: 13px;
    }

    th,
    td {
      border-bottom: 1px solid #ece7de;
      text-align: left;
      padding: 10px 8px;
      vertical-align: top;
    }

    th {
      font-size: 11px;
      letter-spacing: 0.9px;
      text-transform: uppercase;
      color: #5e5a53;
      background: #f6f2eb;
    }

    .pill {
      display: inline-block;
      border: 1px solid #1d5e2b;
      color: #1d5e2b;
      padding: 2px 7px;
      font-size: 11px;
      border-radius: 12px;
    }

    .pill.no {
      border-color: #7c2f2f;
      color: #7c2f2f;
    }

    @media (max-width: 920px) {
      .row {
        grid-template-columns: 1fr;
      }
      .actions {
        grid-template-columns: 1fr;
      }
      table {
        display: block;
        overflow-x: auto;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>VIP Admin</h1>
    <p class="muted">Acesso por token para visualizar inscritos da lista VIP.</p>

    <section class="card">
      <div class="row">
        <input id="vipToken" type="password" placeholder="VIP_ADMIN_TOKEN" autocomplete="off" />
        <button id="saveTokenBtn" type="button">Salvar token</button>
        <button id="clearTokenBtn" type="button" class="secondary">Sair</button>
      </div>
      <p class="status" id="authStatus"></p>
    </section>

    <section class="card">
      <div class="actions">
        <input id="limitInput" type="number" min="1" max="500" value="100" />
        <input id="offsetInput" type="number" min="0" value="0" />
        <button id="loadBtn" type="button">Carregar</button>
      </div>
      <p class="status" id="loadStatus"></p>
    </section>

    <table id="vipTable" hidden>
      <thead>
        <tr>
          <th>ID</th>
          <th>Nome</th>
          <th>Email</th>
          <th>Nascimento</th>
          <th>CPF</th>
          <th>CEP</th>
          <th>Conta</th>
          <th>Data inscricao</th>
        </tr>
      </thead>
      <tbody id="vipTableBody"></tbody>
    </table>
  </main>

  <script src="JS/vip-admin.js?v=20260217a"></script>
</body>
</html>
