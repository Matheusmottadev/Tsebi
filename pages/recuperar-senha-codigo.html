<body class="account-auth-page">
  <header class="cart-simple-header">
    <a class="cart-simple-logo" href="index.html">TSEBI</a>
    <nav class="cart-simple-actions">
      <a href="conta.html">Voltar ao login</a>
      <a href="/cart">Carrinho</a>
    </nav>
  </header>

  <main class="account-auth-main">
    <section class="account-auth-card">
      <p class="account-auth-kicker">Conta Tsebi</p>
      <h1>Redefinir senha</h1>
      <p class="account-auth-flow-note" id="resetCodeFlowNote">
        Informe o codigo recebido por e-mail e defina sua nova senha.
      </p>

      <form id="resetVerifyForm" class="account-auth-form" novalidate>
        <label>
          <span>Codigo de recuperacao</span>
          <input type="text" id="resetCodeInput" inputmode="numeric" maxlength="6" autocomplete="one-time-code" />
        </label>
        <label>
          <span>Nova senha</span>
          <input type="password" id="resetPasswordInput" minlength="8" autocomplete="new-password" />
        </label>
        <label>
          <span>Confirmar nova senha</span>
          <input type="password" id="resetPasswordConfirmInput" minlength="8" autocomplete="new-password" />
        </label>
        <button type="submit" class="account-auth-submit">Redefinir senha</button>
      </form>

      <div class="account-auth-row">
        <button type="button" id="resendResetCodeBtn" class="account-auth-link" disabled>Reenviar codigo em 01:00</button>
        <a class="account-auth-link" href="conta.html">Voltar ao login</a>
      </div>

      <p class="account-auth-feedback" id="resetFeedback" aria-live="polite"></p>
    </section>
  </main>

  <script src="JS/user-utils.js?v=20260220a"></script>
  <script src="JS/recuperar-senha-codigo.js?v=20260217a"></script>

</body>
