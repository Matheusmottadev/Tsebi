<body>
  <header class="cart-simple-header">
    <a class="cart-simple-logo" href="index.html">TSEBI</a>
    <nav class="cart-simple-actions" aria-label="Açőes da página">
      <a href="conta.html" aria-label="Conta">Conta</a>
      <a href="cart.html" aria-label="Carrinho">Carrinho</a>
    </nav>
  </header>

  <main class="payment-result-page">
    <section class="payment-result-card" id="paymentResultCard">
      <div class="payment-loader" id="paymentLoader">
        <span class="payment-loader-spinner" aria-hidden="true"></span>
        <p>Verificando status do pagamento...</p>
      </div>

      <div class="payment-result-content" id="paymentResultContent" hidden>
        <p class="payment-result-kicker" id="resultKicker">Pedido</p>
        <h1 class="payment-result-title" id="resultTitle"></h1>
        <p class="payment-result-message" id="resultMessage"></p>

        <div class="payment-result-summary" id="resultSummary" hidden>
          <p><strong>N?mero do pedido:</strong> <span id="resultOrderId">-</span></p>
          <p><strong>Total:</strong> <span id="resultOrderTotal">-</span></p>
          <ul id="resultItems"></ul>
        </div>

        <p class="payment-result-hint" id="supportHint" hidden>
          Ainda năo recebemos a confirmaçăo final. Se o status năo mudar, fale com nosso suporte.
        </p>

        <div class="payment-result-actions">
          <button class="payment-refresh-btn" id="refreshStatusButton" type="button">Atualizar status</button>
          <a class="payment-action-link" id="ordersButton" href="minha-conta.html">Ver meus pedidos</a>
          <a class="payment-action-link" id="storeButton" href="index.html">Voltar ? loja</a>
          <a class="payment-action-link" id="retryButton" href="cart.html">Tentar novamente</a>
          <a class="payment-action-link" id="whatsappButton" href="https://wa.me/5511918596632" target="_blank" rel="noopener noreferrer">Falar no WhatsApp</a>
        </div>
      </div>
    </section>
